syntax = "proto3";

package omniseer.gateway.v1;

// Minimal operator-facing control/status contract for the first gateway slices.
//
// Versioning rule:
// - evolve additively
// - do not repurpose field numbers
// - keep ROS resource names out of this contract
service RobotGateway {
  // Returns the latest normalized gateway status snapshot.
  rpc GetSystemStatus(GetSystemStatusRequest) returns (SystemStatus);

  // Enables or disables preview mode.
  // When enabled=false, the profile field is ignored.
  rpc SetPreviewMode(SetPreviewModeRequest) returns (SetPreviewModeResponse);

  // Enables or disables bounded gateway teleop.
  // Disabling teleop also commands a stop on the internal robot command path.
  rpc SetTeleopEnabled(SetTeleopEnabledRequest) returns (SetTeleopEnabledResponse);

  // Sends one bounded teleop velocity command.
  // The gateway rejects commands when teleop is disabled or outside configured
  // bounds.
  rpc SendTeleopCommand(SendTeleopCommandRequest) returns (SendTeleopCommandResponse);

  // Returns the latest operator overlay snapshot.
  // Detection coordinates are source-image pixel coordinates; the viewer scales
  // them to the decoded preview frame.
  rpc GetOverlaySnapshot(GetOverlaySnapshotRequest) returns (OverlaySnapshot);
}

message GetSystemStatusRequest {}

message GetOverlaySnapshotRequest {}

enum PreviewState {
  PREVIEW_STATE_UNSPECIFIED = 0;
  PREVIEW_DISABLED = 1;
  PREVIEW_RUNNING = 2;
}

enum PreviewProfile {
  PREVIEW_PROFILE_UNSPECIFIED = 0;
  PREVIEW_PROFILE_LOW_BW = 1;
  PREVIEW_PROFILE_BALANCED = 2;
  PREVIEW_PROFILE_HIGH_QUALITY = 3;
}

enum RobotHealthState {
  ROBOT_HEALTH_STATE_UNSPECIFIED = 0;
  ROBOT_HEALTH_OK = 1;
  ROBOT_HEALTH_DEGRADED = 2;
}

enum TeleopState {
  TELEOP_STATE_UNSPECIFIED = 0;
  TELEOP_DISABLED = 1;
  TELEOP_ENABLED = 2;
  TELEOP_TIMED_OUT = 3;
}

message VisionStatus {
  // False until at least one internal vision status sample has been observed.
  bool available = 1;

  // True when the last observed sample is older than the gateway's freshness window.
  bool stale = 2;
  float producer_fps = 3;
  float consumer_fps = 4;
  float last_infer_ms = 5;
  uint64 infer_error_count = 6;
  uint64 capture_fatal_error_count = 7;
}

message PreviewStatus {
  PreviewState state = 1;
  PreviewProfile profile = 2;
  string last_error = 3;
}

message RobotHealth {
  RobotHealthState state = 1;
  bool ready = 2;
  string summary = 3;
  bool odom_available = 4;
  bool odom_stale = 5;
  float linear_speed_mps = 6;
  float angular_speed_rad_s = 7;
  uint64 odom_age_ms = 8;
  float measured_vx_mps = 9;
  float measured_vy_mps = 10;
  float measured_wz_rad_s = 11;
}

message SystemStatus {
  string gateway_name = 1;
  string gateway_version = 2;
  PreviewStatus preview = 3;
  VisionStatus vision = 4;
  RobotHealth health = 5;
  TeleopStatus teleop = 6;
}

message SetPreviewModeRequest {
  bool enabled = 1;

  // Optional when disabling preview.
  PreviewProfile profile = 2;
}

message SetPreviewModeResponse {
  // Accepted means the request was syntactically valid and processed by the gateway.
  bool accepted = 1;
  string message = 2;

  // The post-request preview status snapshot.
  PreviewStatus preview = 3;
}

message TeleopStatus {
  TeleopState state = 1;
  bool enabled = 2;
  bool timed_out = 3;
  uint64 last_command_age_ms = 4;
  float max_linear_mps = 5;
  float max_angular_rad_s = 6;
  string last_error = 7;
  float last_command_vx_mps = 8;
  float last_command_vy_mps = 9;
  float last_command_wz_rad_s = 10;
}

message SetTeleopEnabledRequest {
  bool enabled = 1;
}

message SetTeleopEnabledResponse {
  bool accepted = 1;
  string message = 2;
  TeleopStatus teleop = 3;
}

message SendTeleopCommandRequest {
  float linear_x_mps = 1;
  float linear_y_mps = 2;
  float angular_z_rad_s = 3;
}

message SendTeleopCommandResponse {
  bool accepted = 1;
  string message = 2;
  TeleopStatus teleop = 3;
}

message OverlayDetection {
  int32 class_id = 1;
  string class_name = 2;
  float score = 3;
  string track_id = 4;
  float bbox_center_x_px = 5;
  float bbox_center_y_px = 6;
  float bbox_width_px = 7;
  float bbox_height_px = 8;
}

message DetectionOverlayStatus {
  // False until at least one internal detection array has been observed.
  bool available = 1;

  // True when the last observed detection array is older than the gateway's
  // freshness window.
  bool stale = 2;

  // Gateway-local age since the last detection array was received.
  uint64 age_ms = 3;

  uint32 source_width_px = 4;
  uint32 source_height_px = 5;
  uint32 detection_count = 6;
  repeated OverlayDetection detections = 7;
}

message OperatorEvent {
  uint64 sequence = 1;
  uint64 age_ms = 2;
  string message = 3;
}

message OverlaySnapshot {
  SystemStatus status = 1;
  DetectionOverlayStatus detections = 2;
  repeated OperatorEvent events = 3;
}
